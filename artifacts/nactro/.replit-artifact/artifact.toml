kind = "web"
previewPath = "/"
title = "Nactro"
version = "1.0.0"
id = "artifacts/nactro"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 24883
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/nactro run dev"

[services.env]
PORT = "24883"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/nactro", "run", "build"]
publicDir = "artifacts/nactro/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
